<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodAR | Scan to Experience</title>
    <style>
        :root {
            --primary: #FF7043;
            --secondary: #6366F1;
            --bg: #0D0D0D;
            --text: #F5F5F5;
            --card: #1C1C1E;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-h: 100vh;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Background Orbs */
        .orb {
            position: absolute;
            width: 50vw;
            height: 50vw;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: 0;
            animation: pulse 8s infinite alternate;
        }

        .orb-1 {
            top: -10%;
            left: -10%;
            background: var(--primary);
        }

        .orb-2 {
            bottom: -10%;
            right: -10%;
            background: var(--secondary);
            animation-delay: 2s;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.15; }
            100% { transform: scale(1.1); opacity: 0.25; }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        .logo span {
            color: var(--primary);
        }

        .description {
            font-size: 1.1rem;
            color: #AAA;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .qr-card {
            background: #FFF;
            padding: 2rem;
            border-radius: 40px;
            display: inline-block;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
            position: relative;
            transition: transform 0.3s ease;
        }

        .qr-card:hover {
            transform: scale(1.02);
        }

        .qr-card img {
            width: 240px;
            height: 240px;
            display: block;
        }

        .qr-label {
            margin-top: 1.5rem;
            color: var(--bg);
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .qr-label svg {
            width: 18px;
            height: 18px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-5px);}
            60% {transform: translateY(-3px);}
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.4;
        }

        .btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 1rem 2rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 100px;
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <div class="logo">Food<span>AR</span></div>
        <p class="description">
            Experience the future of dining. Visualize your meal in AR and order directly from your table.
        </p>

        <div class="qr-card">
            <img id="qr-code" src="" alt="QR Code">
            <div class="qr-label">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
                Scan with Phone
            </div>
        </div>

        <br>
        <a href="/" class="btn">Open Web App</a>

        <div class="footer">Made by Mishra_ji</div>
    </div>

    <script>
        // Dynamically generate QR code based on current URL
        const currentUrl = window.location.origin;
        const qrCodeImg = document.getElementById('qr-code');
        const qrApi = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(currentUrl)}`;
        qrCodeImg.src = qrApi;
    </script>
</body>
</html>
